name: Signed Alpha

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: App version for the alpha bundle
        required: false
        default: 0.1.0-alpha
      build_number:
        description: Build number
        required: false
        default: "1"
  push:
    tags:
      - "signed-alpha-*"

jobs:
  signed-alpha:
    runs-on: macos-15

    env:
      MYCUE_BUNDLE_IDENTIFIER: com.mycue.alpha
      MYCUE_APP_VERSION: ${{ github.event.inputs.app_version || '0.1.0-alpha' }}
      MYCUE_BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}
      MYCUE_CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Decode signing certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > signing-cert.p12

      - name: Decode notarization API key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$HOME/.private_keys"
          echo "$API_KEY_BASE64" | base64 --decode > "$HOME/.private_keys/AuthKey_${APPLE_KEY_ID}.p8"

      - name: Create temporary keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          export MYCUE_CODESIGN_KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "MYCUE_CODESIGN_KEYCHAIN=$MYCUE_CODESIGN_KEYCHAIN" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$MYCUE_CODESIGN_KEYCHAIN"
          security list-keychains -d user -s "$MYCUE_CODESIGN_KEYCHAIN" login.keychain-db
          security default-keychain -s "$MYCUE_CODESIGN_KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$MYCUE_CODESIGN_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$MYCUE_CODESIGN_KEYCHAIN"
          security import signing-cert.p12 -k "$MYCUE_CODESIGN_KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$MYCUE_CODESIGN_KEYCHAIN"
          security find-identity -v -p codesigning "$MYCUE_CODESIGN_KEYCHAIN"

      - name: Build signed alpha bundle
        run: bash scripts/build-alpha.sh

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 dist/MyCue.app

      - name: Notarize alpha zip
        run: |
          xcrun notarytool submit dist/MyCue-alpha.zip \
            --key "$HOME/.private_keys/AuthKey_${APPLE_KEY_ID}.p8" \
            --key-id "$APPLE_KEY_ID" \
            --issuer "$APPLE_ISSUER_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple dist/MyCue.app
          codesign --verify --deep --strict --verbose=2 dist/MyCue.app
          spctl -a -vv dist/MyCue.app

      - name: Repack stapled alpha zip
        run: |
          rm -f dist/MyCue-alpha.zip
          ditto -c -k --sequesterRsrc --keepParent dist/MyCue.app dist/MyCue-alpha.zip

      - name: Upload signed alpha artifact
        uses: actions/upload-artifact@v4
        with:
          name: mycue-alpha-signed
          path: |
            dist/MyCue.app
            dist/MyCue-alpha.zip
          if-no-files-found: error
