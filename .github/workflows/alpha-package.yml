name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build release bundle
        run: bash scripts/build-alpha.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: mycue-unsigned
          path: |
            dist/MyCue.app
            dist/MyCue.zip
            dist/MyCue.dmg
          if-no-files-found: error
